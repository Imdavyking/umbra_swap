services:
  postgres:
    image: postgres:15
    ports:
      - "5555:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=default_password
      - POSTGRES_DB=checkpoint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  indexer:
    build:
      context: .
    ports:
      - 5100:5100
    networks:
      - app-network
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5100"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
